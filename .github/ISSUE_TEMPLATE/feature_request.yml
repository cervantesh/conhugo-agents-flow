name: Feature request
description: Propose an improvement to ConHugo Agents Flow
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and boundaries
      description: What should stay out of scope?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How would we know this is done?
    validations:
      required: true
