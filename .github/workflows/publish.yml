name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish built artifacts"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: publish-${{ github.ref }}-${{ github.event_name }}-${{ inputs.target || 'tag' }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

      - name: Build package
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish-testpypi:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' && vars.TEST_PYPI_PUBLISHING_ENABLED == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/conhugo-agents-flow
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/conhugo-agents-flow
    permissions:
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  testpypi-disabled:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' && vars.TEST_PYPI_PUBLISHING_ENABLED != 'true'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Explain TestPyPI skip
        run: |
          echo "TestPyPI publishing is disabled for this repository."
          echo "Set repository variable TEST_PYPI_PUBLISHING_ENABLED=true after registering the trusted publisher for the testpypi environment."
